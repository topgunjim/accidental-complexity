# DNSCrypt-proxy — shared encrypted upstream for both Pi-hole pods.
# Reachable at dnscrypt-proxy.pihole.svc.cluster.local:15050
# Two replicas on capacity=med nodes, required anti-affinity to spread them.

---
apiVersion: v1
kind: ConfigMap
metadata:
  name: dnscrypt-proxy-config
  namespace: pihole
  labels:
    app.kubernetes.io/name: dnscrypt-proxy
data:
  dnscrypt-proxy.toml: |
    listen_addresses = ['0.0.0.0:15050']

    # cloudflare            — DoH, no-log, DNSSEC
    # cloudflare-security   — DoH, no-log, DNSSEC, malware blocking
    server_names = ['cloudflare', 'cloudflare-security']

    require_dnssec   = true
    require_nolog    = true
    require_nofilter = false
    ipv6_servers     = false

    cache = true
    cache_size = 4096
    cache_min_ttl = 600
    cache_max_ttl = 86400
    cache_neg_min_ttl = 60
    cache_neg_max_ttl = 600

    log_level = 2

    [sources]
      [sources.public-resolvers]
      urls = [
        'https://raw.githubusercontent.com/DNSCrypt/dnscrypt-resolvers/master/v3/public-resolvers.md',
        'https://download.dnscrypt.info/resolvers-list/v3/public-resolvers.md'
      ]
      cache_file   = '/cache/public-resolvers.md'
      minisign_key = 'RWQf6LRCGA9i53mlYecO4IzT51TGPpvWucNSCh1CBM0QTaLn73Y7GFO3'
      refresh_delay = 72
      prefix = ''

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: dnscrypt-proxy
  namespace: pihole
  labels:
    app.kubernetes.io/name: dnscrypt-proxy
spec:
  replicas: 2
  selector:
    matchLabels:
      app.kubernetes.io/name: dnscrypt-proxy
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 1
      maxSurge: 1
  template:
    metadata:
      labels:
        app.kubernetes.io/name: dnscrypt-proxy
    spec:
      nodeSelector:
        capacity: med
      # Require each replica on a different node
      affinity:
        podAntiAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
            - labelSelector:
                matchLabels:
                  app.kubernetes.io/name: dnscrypt-proxy
              topologyKey: kubernetes.io/hostname
      containers:
        - name: dnscrypt-proxy
          image: klutchell/dnscrypt-proxy:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 15050
              protocol: UDP
            - containerPort: 15050
              protocol: TCP
          volumeMounts:
            - name: config
              mountPath: /config/dnscrypt-proxy.toml
              subPath: dnscrypt-proxy.toml
              readOnly: true
            - name: cache
              mountPath: /cache
          readinessProbe:
            tcpSocket:
              port: 15050
            initialDelaySeconds: 20
            periodSeconds: 30
            failureThreshold: 3
          livenessProbe:
            tcpSocket:
              port: 15050
            initialDelaySeconds: 30
            periodSeconds: 60
            failureThreshold: 5
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 200m
              memory: 128Mi
      volumes:
        - name: config
          configMap:
            name: dnscrypt-proxy-config
        - name: cache
          emptyDir: {}

---
apiVersion: v1
kind: Service
metadata:
  name: dnscrypt-proxy
  namespace: pihole
  labels:
    app.kubernetes.io/name: dnscrypt-proxy
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: dnscrypt-proxy
  ports:
    - name: dns-udp
      port: 15050
      targetPort: 15050
      protocol: UDP
    - name: dns-tcp
      port: 15050
      targetPort: 15050
      protocol: TCP
