# Nebula Sync — syncs gravity DB + config from pihole-0 → pihole-1
# Runs daily at 2am on the capacity:min node (node10 / merlin)
# Uses Pi-hole v6 REST API — NOT compatible with Orbital Sync (v5 only)

---
apiVersion: batch/v1
kind: CronJob
metadata:
  name: nebula-sync
  namespace: pihole
  labels:
    app.kubernetes.io/name: nebula-sync
spec:
  schedule: "0 2 * * *"
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: 3
  failedJobsHistoryLimit: 5
  jobTemplate:
    spec:
      backoffLimit: 2
      template:
        spec:
          nodeSelector:
            capacity: min
          restartPolicy: OnFailure
          containers:
            - name: nebula-sync
              image: ghcr.io/lovelaze/nebula-sync:latest
              imagePullPolicy: IfNotPresent
              env:
                - name: PIHOLE_PASSWORD
                  valueFrom:
                    secretKeyRef:
                      name: pihole-secret
                      key: password
                # Kubernetes env var substitution — password injected into URL
                - name: PRIMARY
                  value: "http://pihole-0.pihole-headless.pihole.svc.cluster.local|$(PIHOLE_PASSWORD)"
                - name: REPLICAS
                  value: "http://pihole-1.pihole-headless.pihole.svc.cluster.local|$(PIHOLE_PASSWORD)"
                - name: FULL_SYNC
                  value: "true"
                - name: RUN_GRAVITY
                  value: "true"
              resources:
                requests:
                  cpu: 20m
                  memory: 32Mi
                limits:
                  cpu: 100m
                  memory: 64Mi
