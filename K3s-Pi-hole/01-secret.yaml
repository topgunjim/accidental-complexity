#Two options
#Option #1
# Do NOT apply this file if you create the secret via kubectl (recommended).
# Instead run:
#   kubectl create secret generic pihole-secret \
#     --from-literal=password='REPLACE_WITH_STRONG_PASSWORD' \
#     -n pihole
#
# Same password used by all Pi-hole pods and Nebula Sync.

#Option #2
apiVersion: v1
kind: Secret
metadata:
  name: pihole-secret
  namespace: pihole
  labels:
    app.kubernetes.io/name: pihole
type: Opaque
stringData:
  password: "REPLACE_WITH_STRONG_PASSWORD"
